{% extends 'base.html' %} 

{% block content %}
<div class="glass-container">
  <h1>Identity Verification</h1>
  <p class="subtitle">Secure login required to access neural engine.</p>

  {% if form.errors %}
  <div class="alert alert-error">Access Denied: Invalid Credentials. Please check username and password.</div>
  {% endif %}

  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-group">
      <label>Operator Username</label>
      <input type="text" name="username" class="glass-input" placeholder="e.g. Neo" required />
    </div>

    <div class="form-group">
      <label>Operator Password</label>
      <input type="password" name="password" class="glass-input" placeholder="••••••••" required />
    </div>

    <button type="submit" class="neon-btn">Authenticate</button>
  </form>

  <div class="auth-links">
    New User?
    <a href="{% url 'register' %}">Register Protocol</a>
  </div>
</div>
{% endblock %}
