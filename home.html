{% extends 'base.html' %}

{% block content %}
<div class="glass-container">
  <h1>Welcome to Neural Translator</h1>
  <p class="subtitle">AI-driven document linguistic reconfiguration.</p>

  <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center;">
    {% if user.is_authenticated %}
    <a href="{% url 'translator' %}" style="text-decoration: none; width: 100%;">
      <button class="neon-btn">Access Translator Interface</button>
    </a>
    {% else %}
    <a href="{% url 'login' %}" style="text-decoration: none; width: 50%;">
      <button class="neon-btn">Initialize Link (Login)</button>
    </a>
    <a href="{% url 'register' %}" style="text-decoration: none; width: 50%;">
      <button class="neon-btn"
        style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); box-shadow: none;">Register
        Protocol</button>
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
